  # petra_lr:
  #   distribution: log_uniform
  #   min: 0.00001
  #   max: 0.001
  # Example of a uniform distribution, if needed, uncomment and modify appropriately
  # batch_size:
  #   distribution: uniform
  #   low: 0.1
  #   high: 0.5
