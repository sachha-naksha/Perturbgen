data:
  tgt_dataset_folder: "T_perturb/tokenized_data/hspc_pbmc_median/dataset_10000_hvg_tgt_pert"
  src_dataset_file: "T_perturb/tokenized_data/hspc_pbmc_median/dataset_10000_hvg_src_pert/intermediate.dataset"
  src_adata_file: "T_perturb/tokenized_data/hspc_pbmc_median/h5ad_pairing_10000_hvg_src_pert/intermediate.h5ad"
  tgt_adata_folder: "T_perturb/tokenized_data/hspc_pbmc_median/h5ad_pairing_10000_hvg_tgt_pert"
  cond_list:
    - 'celltype_v2'
    - 'diff_state'
  perturb_genes_file: 'T_perturb/res/hspc/gene_embedding/20250312_gene_clusters_LMPP_L4.csv'
  perturb_cluster:
  - '75'

trainer:
  tgt_vocab_size: 5710
  d_model: 768
  num_heads: 8
  num_layers: 6
  d_ff: 64
  max_seq_length: 2200
  dropout: 0
  mask_scheduler: 'cosine'
  output_dir: 'T_perturb/res/hspc/perturbation'
  mapping_dict_path: 'T_perturb/tokenized_data/hspc_pbmc_median/token_id_to_genename_10000_hvg.pkl'
  tokenid_to_rowid_path: 'T_perturb/tokenized_data/hspc_pbmc_median/tokenid_to_rowid_10000_hvg.pkl'
  encoder: 'scmaskgit'
  encoder_path: '/lustre/scratch126/cellgen/lotfollahi/av13/scmaskgit/output2/checkpoints/20250620_1508_cellgen_train_masking_lr_5e-05_wd_1e-06_batch_64_ptime_pos_sin_m_pow_tp_1-2-3_s_42-epoch=07.ckpt'
  context_mode: False
  temperature: 1.5
  iterations: 19
  pos_encoding_mode: 'time_pos_sin'
  perturbation_mode: 'pad'
  genes_to_perturb:
    - 'MPO'
  validation_mode: 'inference'
  perturbation_sequence:
    - 'src'
  var_list:
    - 'sex'
    - 'phase'
    - 'tissue'
    - 'celltype_v2'
    - 'diff_state'
  pred_tps:
    - 1
  #count decoder
  use_count_decoder: true
  loss_mode: 'zinb'
  n_samples: 3


datamodule:
  batch_size: 64
  num_workers: 4
  shuffle: False
  split: False
  max_len: 2200
  var_list:
    - 'sex'
    - 'phase'
    - 'tissue'
    - 'celltype_v2'
    - 'diff_state'
  pred_tps:
    - 1
model:
  precision: 16
  ckpt_masking_path: "T_perturb/res/hspc/checkpoints/20250321_0448_cellgen_train_count_lr_0.005_wd_0.001_batch_64_zinb_tp_1_s_42_pos_time_pos_sin_m_cosine-epoch=19.ckpt"
